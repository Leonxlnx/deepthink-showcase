<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Animated UI Navigation</title>
    <style>
        /* 
      ========================================================
      1. THEME VARIABLES & COLOR PALETTES
      ========================================================
    */
        :root {
            /* Dark Mode Palette (Default) */
            --bg-color: #050505;
            --toolbar-bg: rgba(24, 24, 27, 0.85);
            --toolbar-border: rgba(255, 255, 255, 0.08);
            --toolbar-shadow:
                0 30px 60px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.05),
                inset 0 -1px 1px rgba(0, 0, 0, 0.4);

            --item-color: #71717a;
            --item-hover-color: #a1a1aa;
            --item-active-color: #ffffff;

            --active-inner-bg: #121214;
            --inner-highlight: rgba(255, 255, 255, 0.06);
            --inner-shadow: 0 4px 12px rgba(0, 0, 0, 0.8);
            --inner-border: rgba(0, 0, 0, 0.8);

            --theme-toggle-bg: transparent;
            --sep-color: rgba(255, 255, 255, 0.06);

            --gold-glow: #e8af48;
            --ring-shadow: 0 4px 12px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.2);

            /* Bubble ripple */
            --bubble-color: rgba(255, 255, 255, 0.06);
        }

        body.light {
            /* Light Mode Palette */
            --bg-color: #f0f0f4;
            --toolbar-bg: rgba(255, 255, 255, 0.9);
            --toolbar-border: rgba(0, 0, 0, 0.05);
            --toolbar-shadow:
                0 20px 40px rgba(0, 0, 0, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 1),
                inset 0 -1px 1px rgba(0, 0, 0, 0.03);

            --item-color: #a1a1aa;
            --item-hover-color: #52525b;
            --item-active-color: #09090b;

            --active-inner-bg: #ffffff;
            --inner-highlight: rgba(255, 255, 255, 1);
            --inner-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            --inner-border: rgba(0, 0, 0, 0.04);

            --theme-toggle-bg: #f4f4f5;
            --sep-color: rgba(0, 0, 0, 0.06);

            --gold-glow: #e8c15a;
            --ring-shadow: 0 2px 8px rgba(0, 0, 0, 0.1), inset 0 0 0 1px rgba(0, 0, 0, 0.05);

            --bubble-color: rgba(0, 0, 0, 0.04);
        }

        /* 
      ========================================================
      2. BASE SETUP & AMBIENT EFFECTS
      ========================================================
    */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            transition: background 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
        }

        /* Subtle Film Grain Noise for Premium Texture */
        .noise {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            transition: opacity 0.6s ease;
        }

        body.light .noise {
            opacity: 0.02;
        }

        /* Cinematic Radial Backlight */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 60vh;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.03) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        body.light .ambient-glow {
            opacity: 0;
        }

        /* 
      ========================================================
      3. TOOLBAR CONTAINER
      ========================================================
    */
        .toolbar {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--toolbar-bg);
            padding: 12px;
            border-radius: 40px;
            border: 1px solid var(--toolbar-border);
            box-shadow: var(--toolbar-shadow);
            z-index: 10;
            transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);

            /* Glassmorphism */
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .nav-group {
            display: flex;
            align-items: center;
            position: relative;
        }

        .spacer {
            width: 12px;
        }

        /* 
      ========================================================
      4. THE MAGIC GOLDEN SLIDER (IRIDESCENT BORDER)
      ========================================================
    */
        .active-indicator {
            position: absolute;
            top: 0;
            left: 0;
            width: 56px;
            height: 56px;
            z-index: 1;
            transition: transform 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        /* Nested scale wrapper allows bouncy press effect without interrupting slide */
        .indicator-scale {
            position: relative;
            width: 100%;
            height: 100%;
            transform: scale(var(--scale, 1));
            transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Glowing spill onto the dark toolbar */
        .indicator-glow {
            position: absolute;
            inset: -4px;
            border-radius: 22px;
            background: var(--gold-glow);
            filter: blur(12px);
            opacity: 0.15;
            transition: background 0.6s, opacity 0.6s;
        }

        body.light .indicator-glow {
            opacity: 0.25;
        }

        /* Clip mask for the rotating gradient */
        .indicator-ring {
            position: absolute;
            inset: 0;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: var(--ring-shadow);
            transition: box-shadow 0.6s ease;
        }

        /* 
       Hyper-realistic chromatic reflection map. 
       Note the pink/blue iridescence framing the white hot-spots to mimic real studio lighting on gold.
    */
        .gold-spin {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg,
                    #533517 0%, #c49746 12%, #feeaa5 22%, #ffffff 25%,
                    #ffc0cb 27%, #87ceeb 29%, #ffffff 31%, #feeaa5 34%,
                    #c49746 45%, #533517 55%, #c49746 65%, #feeaa5 75%,
                    #ffffff 78%, #ffc0cb 80%, #87ceeb 82%, #ffffff 84%,
                    #feeaa5 87%, #533517 100%);
            animation: spin 4.5s linear infinite;
        }

        /* The core button plate punching out the center of the ring */
        .indicator-inner {
            position: absolute;
            inset: 2px;
            /* Leaves exactly 2px of the golden ring visible */
            border-radius: 16px;
            background: var(--active-inner-bg);
            box-shadow:
                inset 0 1px 1px var(--inner-highlight),
                inset 0 -1px 1px rgba(0, 0, 0, 0.1),
                0 0 0 1px var(--inner-border),
                0 2px 6px var(--inner-shadow);
            transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Subtle glassy top-edge bevel inside the plate */
        .indicator-inner::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.06) 0%, transparent 40%);
            pointer-events: none;
        }

        body.light .indicator-inner::after {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.6) 0%, transparent 40%);
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* 
      ========================================================
      5. NAVIGATION BUTTONS & SEPARATORS
      ========================================================
    */
        .nav-item {
            position: relative;
            width: 56px;
            height: 56px;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--item-color);
            transition: color 0.4s ease, transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 2;
            /* Ensure icon sits above the sliding plate */
            outline: none;
        }

        .nav-item:not(.active):hover {
            color: var(--item-hover-color);
        }

        .nav-item.active {
            color: var(--item-active-color);
        }

        /* Physical push down effect on the button itself */
        .nav-item:active {
            transform: scale(0.9);
        }

        .separator {
            width: 1px;
            height: 24px;
            background: var(--sep-color);
            margin: 0 6px;
            border-radius: 1px;
            transition: background 0.6s ease;
        }

        /* Universal Icon Properties */
        .icon {
            width: 26px;
            height: 26px;
            stroke: currentColor;
            stroke-width: 1.75;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        /* 
      ========================================================
      6. THEME TOGGLE (SUN / MOON) — Bubbly Soft Switch
      ========================================================
    */
        .theme-toggle {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: var(--theme-toggle-bg);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--item-active-color);
            transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            outline: none;
            position: relative;
            overflow: hidden;
        }

        .theme-toggle:active .theme-toggle-inner {
            transform: scale(0.85);
        }

        /* Bubble ripple element — grows from center on click */
        .theme-bubble {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: var(--bubble-color);
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0;
            z-index: 0;
        }

        .theme-bubble.pop {
            animation: bubblePop 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes bubblePop {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
            }

            50% {
                width: 200px;
                height: 200px;
                opacity: 0.6;
            }

            100% {
                width: 260px;
                height: 260px;
                opacity: 0;
            }
        }

        .theme-toggle-inner {
            position: relative;
            width: 26px;
            height: 26px;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1;
        }

        .sun-icon,
        .moon-icon {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition:
                transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.45s ease;
        }

        /* Default (Dark Mode) states — Sun visible */
        .sun-icon {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        .moon-icon {
            opacity: 0;
            transform: rotate(-90deg) scale(0.3);
        }

        /* Light Mode states — Moon visible */
        body.light .sun-icon {
            opacity: 0;
            transform: rotate(90deg) scale(0.3);
        }

        body.light .moon-icon {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        /* Bounce-in effect on the entire toggle button during switch */
        .theme-toggle.switching {
            animation: toggleBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes toggleBounce {
            0% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.25);
            }

            50% {
                transform: scale(0.92);
            }

            75% {
                transform: scale(1.06);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div class="noise"></div>
    <div class="ambient-glow"></div>

    <div class="toolbar">
        <div class="nav-group">

            <div class="active-indicator" id="indicator">
                <div class="indicator-scale" id="indicator-scale">
                    <div class="indicator-glow"></div>
                    <div class="indicator-ring">
                        <div class="gold-spin"></div>
                    </div>
                    <div class="indicator-inner"></div>
                </div>
            </div>

            <!-- Icon 1: Home -->
            <button class="nav-item active">
                <svg class="icon" viewBox="0 0 24 24">
                    <path
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1">
                    </path>
                </svg>
            </button>

            <div class="separator"></div>

            <!-- Icon 2: Search -->
            <button class="nav-item">
                <svg class="icon" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="7"></circle>
                    <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
                </svg>
            </button>

            <div class="separator"></div>

            <!-- Icon 3: User -->
            <button class="nav-item">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </button>

        </div>

        <div class="spacer"></div>

        <!-- Theme Toggle with Bubble Animation -->
        <button class="theme-toggle" id="themeBtn">
            <div class="theme-bubble" id="themeBubble"></div>
            <div class="theme-toggle-inner">
                <svg class="icon sun-icon" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="4.5"></circle>
                    <line x1="12" y1="2" x2="12" y2="4"></line>
                    <line x1="12" y1="20" x2="12" y2="22"></line>
                    <line x1="4.93" y1="4.93" x2="6.34" y2="6.34"></line>
                    <line x1="17.66" y1="17.66" x2="19.07" y2="19.07"></line>
                    <line x1="2" y1="12" x2="4" y2="12"></line>
                    <line x1="20" y1="12" x2="22" y2="12"></line>
                    <line x1="4.93" y1="19.07" x2="6.34" y2="17.66"></line>
                    <line x1="17.66" y1="6.34" x2="19.07" y2="4.93"></line>
                </svg>
                <svg class="icon moon-icon" viewBox="0 0 24 24">
                    <path d="M19 15.5A8.5 8.5 0 1 1 9.5 4.5 7.5 7.5 0 0 0 19 15.5z"></path>
                </svg>
            </div>
        </button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const navItems = document.querySelectorAll('.nav-item');
            const indicator = document.getElementById('indicator');
            const indicatorScale = document.getElementById('indicator-scale');

            // Calculate and execute hardware-accelerated slide 
            function moveIndicator(item) {
                indicator.style.transform = `translateX(${item.offsetLeft}px)`;
            }

            // Initialize perfectly into position without playing a transition flash
            const activeItem = document.querySelector('.nav-item.active');
            if (activeItem) {
                setTimeout(() => {
                    indicator.style.transition = 'none';
                    moveIndicator(activeItem);
                    void indicator.offsetWidth;
                    indicator.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.2, 0.64, 1)';
                }, 0);
            }

            // Core Interaction Engine
            navItems.forEach(item => {
                item.addEventListener('pointerdown', () => indicatorScale.style.setProperty('--scale', '0.9'));
                item.addEventListener('pointerup', () => indicatorScale.style.setProperty('--scale', '1'));
                item.addEventListener('pointerleave', () => indicatorScale.style.setProperty('--scale', '1'));

                item.addEventListener('click', () => {
                    if (item.classList.contains('active')) return;

                    document.querySelector('.nav-item.active').classList.remove('active');
                    item.classList.add('active');
                    moveIndicator(item);
                });
            });

            // Keep UI locked onto the correct button during window resizes
            window.addEventListener('resize', () => {
                const currentActive = document.querySelector('.nav-item.active');
                if (currentActive) {
                    indicator.style.transition = 'none';
                    moveIndicator(currentActive);
                    void indicator.offsetWidth;
                    indicator.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.2, 0.64, 1)';
                }
            });

            // ═══ Bubbly Smooth Theme Switch ═══
            const themeBtn = document.getElementById('themeBtn');
            const themeBubble = document.getElementById('themeBubble');

            themeBtn.addEventListener('click', () => {
                // 1. Fire the bubble ripple
                themeBubble.classList.remove('pop');
                void themeBubble.offsetWidth; // reflow to restart animation
                themeBubble.classList.add('pop');

                // 2. Bounce the entire toggle button
                themeBtn.classList.remove('switching');
                void themeBtn.offsetWidth;
                themeBtn.classList.add('switching');

                // 3. Toggle theme
                document.body.classList.toggle('light');

                // Clean up animation classes
                setTimeout(() => {
                    themeBtn.classList.remove('switching');
                    themeBubble.classList.remove('pop');
                }, 800);
            });
        });
    </script>
</body>

</html>
